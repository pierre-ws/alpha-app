apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: team-alpha
data:
  nginx.conf: |
    server {
      listen 80;

      location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <title>Alpha App</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 24px; }
        h1 { font-size: 2rem; }
        p { color: #8b949e; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 32px 48px; text-align: center; max-width: 600px; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px 14px; border-bottom: 1px solid #30363d; text-align: left; font-size: 0.9rem; }
        th { color: #8b949e; font-weight: 500; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; background: #238636; color: #fff; }
        .error { color: #f85149; font-size: 0.85rem; margin-top: 12px; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Alpha App 🚀</h1>
        <p>Frontend → Backend → Azure PostgreSQL (passwordless via Workload Identity)</p>
        <table id="items">
          <thead><tr><th>ID</th><th>Name</th><th>Created</th></tr></thead>
          <tbody><tr><td colspan="3" style="color:#8b949e">Loading…</td></tr></tbody>
        </table>
        <div class="error" id="error" style="display:none"></div>
      </div>
      <script>
        fetch('/api/items')
          .then(r => r.ok ? r.json() : Promise.reject(r.statusText))
          .then(items => {
            const tbody = document.querySelector('#items tbody');
            tbody.innerHTML = items.length
              ? items.map(i => `<tr><td>${i.id}</td><td><span class="badge">${i.name}</span></td><td>${new Date(i.created_at).toLocaleString()}</td></tr>`).join('')
              : '<tr><td colspan="3" style="color:#8b949e">No items found.</td></tr>';
          })
          .catch(err => {
            document.querySelector('#items tbody').innerHTML = '';
            const el = document.getElementById('error');
            el.style.display = 'block';
            el.textContent = 'Backend error: ' + err;
          });
      </script>
    </body>
    </html>
