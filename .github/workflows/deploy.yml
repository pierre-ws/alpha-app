name: Deploy to AKS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: acrpoliciesreferential.azurecr.io/alpha-app
  ACR_NAME: ACRPoliciesReferential

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEPLOYER_MSI_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          IMG="${IMAGE_NAME}/frontend:${{ steps.meta.outputs.tag }}"
          az acr login --name "${ACR_NAME}"
          docker build -t "${IMG}" \
            -f src/frontend/Dockerfile src/frontend/
          docker push "${IMG}"

      - name: Build and push backend image
        run: |
          IMG="${IMAGE_NAME}/backend:${{ steps.meta.outputs.tag }}"
          az acr login --name "${ACR_NAME}"
          docker build -t "${IMG}" \
            -f src/backend/Dockerfile src/backend/
          docker push "${IMG}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEPLOYER_MSI_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.0.24'

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: policy-referential
          cluster-name: Cluster_Policies
          use-kubelogin: 'true'

      - name: Inject image references
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          for f in manifests/deployment.yaml manifests/backend-deployment.yaml; do
            envsubst '${ACR_NAME}${IMAGE_TAG}' < "$f" > "$f.rendered"
            mv "$f.rendered" "$f"
          done
          if grep -rlE '\$\{[A-Z_]+\}' manifests/deployment.yaml manifests/backend-deployment.yaml; then
            echo "ERROR: unresolved placeholders found"
            exit 1
          fi

      - name: Deploy manifests
        run: kubectl apply -f manifests/ -n team-alpha

